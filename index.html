<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Odin Library</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Odin Library</h1>

            <nav>
                <button command="show-modal" commandfor="my-dialog">Add Book</button>
            </nav>
        </header>
        <main>

            <dialog id="my-dialog">


                <h2>New Book</h2>
                
                <form method="dialog" >

                    <p>
                        <label for="title">Title:</label>
                        <input type="text" id="title" name="title" required>                        
                    </p>

                    <p>
                        <label for="author">Author:</label>
                        <input type="text" id="author" name="author" required>                        
                    </p>

                    <p>
                        <label for="genre">Genre:</label>
                        <select name="genre" id="genre">
                            <option class="test" value="Romance">Romance</option>
                            <option value="Science Fiction">Science Fiction</option>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Mystery & Crime">Mystery & Crime</option>
                            <option value="Thriller & Suspense">Thriller & Suspense</option>
                            <option value="Historical Fiction">Historical Fiction</option>
                            <option value="Horror">Horror</option>
                            <option value="Biography">Biography</option>
                            <option value="History">History</option>
                            <option value="Self Help & Personal Development">Self Help & Personal Development</option>
                            <option value="True Crime">True Crime</option>
                            <option value="Literary Fiction">Literary Fiction</option>
                        </select>
                    </p>



                    <fieldset >

                        <legend class="sr-only">Book Progress:</legend>

                        <ul>
                            <li>
                                <label for="reading">
                                    <input type="radio" id="reading" name="book-progress" value="Reading">
                                    Reading
                                </label>
                            </li>

                            <li>
                                <label for="unread">
                                    <input type="radio" id="unread" name="book-progress" value="Unread" checked>
                                    Unread
                                </label>
                            </li>

                            <li>
                                <label for="finish">
                                    <input type="radio" id="finish" name="book-progress" value="Finish">
                                    Finish
                                </label>
                            </li>
                        </ul>

                    </fieldset>

                    <p>
                        <label for="book-cover">Book Cover Url:</label>
                        <input type="url" name="book-cover" id="book-cover">
                    </p>


                    <input type="submit" id="confirm-btn" value="Confirm">

                </form>

                <button commandfor="my-dialog" command="close">Close</button>
            </dialog>

            <div class="books">
    


            </div>

            <template id="card-template">
                <article class="card">
                    <img src="" alt="book cover">
                    <h2 class="title"></h2>
                    <p class="author"></p>
                    <p class="genre"></p>
                    <div class="buttons">
                        <button id="card-btn-left" class="card-btn"></button>
                        <button id="card-btn-right" class="card-btn">
                            <svg>
                                <use href="./icons/delete-outline.svg"></use>
                            </svg>
                        </button>
                    </div>
                        

                </article>                    
            </template>            

            


        </main>
        
        <footer>
            <a href="https://github.com/Septerm/Odin-Library">
                <svg>
                    <use href="./icons/github.svg"></use>
                </svg>
            </a>
            <p itemprop="author" itemscope itemtype="https://schema.org/Person">Created by <span itemprop="name">Garion Charles</span></p>
        </footer>
    </div>

    <script src="./script.js"></script>
</body>
</html>
